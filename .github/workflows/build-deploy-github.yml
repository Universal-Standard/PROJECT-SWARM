name: "Deploy: GitHub Platform Variant"

on:
  push:
    branches: [main]
    paths:
      - "platforms/github/**"
      - ".github/workflows/api-*.yml"
      - ".github/workflows/auth-*.yml"
      - "client/src/**"
      - "shared/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-platform-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root deps (shared types)
        run: npm ci

      - name: Install platform deps
        run: npm ci
        working-directory: platforms/github

      - name: Build
        run: npm run build
        working-directory: platforms/github
        env:
          NODE_ENV: production
          VITE_GITHUB_OWNER: ${{ vars.GITHUB_OWNER || github.repository_owner }}
          VITE_GITHUB_REPO: ${{ vars.GITHUB_REPO || github.event.repository.name }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.SWARM_GITHUB_CLIENT_ID }}
          VITE_BOOTSTRAP_TOKEN: ${{ secrets.SWARM_BOOTSTRAP_TOKEN }}

      - name: Create .nojekyll
        run: touch platforms/github/dist/.nojekyll

      - name: Copy 404.html
        run: |
          if [ -f "client/404.html" ]; then
            cp client/404.html platforms/github/dist/404.html
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: "platforms/github/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
