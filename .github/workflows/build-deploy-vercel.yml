name: "Deploy: Vercel Platform Variant"

on:
  push:
    branches: [main]
    paths:
      - "platforms/vercel/**"
      - "platforms/shared/server/**"
      - "client/src/**"
      - "server/**"
      - "shared/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root deps
        run: npm ci

      - name: Install platform deps
        run: npm ci
        working-directory: platforms/vercel

      - name: Build frontend
        run: npm run build
        working-directory: platforms/vercel
        env:
          NODE_ENV: production
          VITE_BACKEND: vercel

      - name: Deploy to Vercel (Preview)
        if: github.ref != 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          vercel-args: "--build-env VITE_BACKEND=vercel"

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod --build-env VITE_BACKEND=vercel"
          working-directory: .
