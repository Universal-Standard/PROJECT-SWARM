name: "API: Update Execution"
# Proof-of-concept: workflow_dispatch used as an HTTP PATCH equivalent.
# Updates an existing execution_runs record (status, completed_at, cost).

on:
  workflow_dispatch:
    inputs:
      execution_id:
        description: "Execution ID to update"
        required: true
        type: string
      status:
        description: "New status"
        required: false
        type: choice
        options: [queued, in_progress, completed, failed]
      mark_completed:
        description: "Set completed_at to now?"
        required: false
        type: boolean
        default: false
      add_cost_cents:
        description: "Add to cost_cents (incremental)"
        required: false
        type: string
        default: "0"

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install runtime deps
        run: npm ci --omit=dev --ignore-scripts || npm install better-sqlite3

      - name: Update execution record
        id: update
        env:
          EXECUTION_ID: ${{ inputs.execution_id }}
          STATUS: ${{ inputs.status }}
          MARK_COMPLETED: ${{ inputs.mark_completed }}
          ADD_COST: ${{ inputs.add_cost_cents }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p api-output
          node - << 'EOF'
          const Database = require('better-sqlite3');
          const fs       = require('fs');

          const db = new Database('swarm.db');
          db.pragma('journal_mode = WAL');
          db.pragma('foreign_keys = ON');

          const id = process.env.EXECUTION_ID;

          // Check if record exists
          const existing = db.prepare('SELECT * FROM execution_runs WHERE id = ?').get(id);
          if (!existing) {
            console.error('Execution not found:', id);
            process.exit(1);
          }

          // Build UPDATE statement dynamically
          const updates = [];
          const params  = { $id: id };

          if (process.env.STATUS) {
            updates.push('status = $status');
            params.$status = process.env.STATUS;
          }

          if (process.env.MARK_COMPLETED === 'true') {
            updates.push('completed_at = $completed_at');
            params.$completed_at = Math.floor(Date.now() / 1000);
          }

          const addCost = parseInt(process.env.ADD_COST || '0');
          if (addCost > 0) {
            updates.push('cost_cents = cost_cents + $add_cost');
            params.$add_cost = addCost;
          }

          // Always update the timestamp
          updates.push('updated_at = $updated_at');
          params.$updated_at = Math.floor(Date.now() / 1000);

          if (updates.length === 0) {
            console.log('No updates specified (other than updated_at)');
          }

          const sql = `UPDATE execution_runs SET ${updates.join(', ')} WHERE id = $id`;
          const info = db.prepare(sql).run(params);

          // Fetch updated record
          const updated = db.prepare('SELECT * FROM execution_runs WHERE id = ?').get(id);
          db.close();

          const body = JSON.stringify({
            success: true,
            changes: info.changes,
            before: existing,
            after: updated,
            meta: {
              workflow_run_id:  process.env.RUN_ID,
              workflow_run_url: `https://github.com/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`,
              updated_at: new Date().toISOString(),
            },
          }, null, 2);

          fs.writeFileSync('api-output/result.json', body);
          console.log('Updated execution:', id, '— changes:', info.changes);
          EOF

      - name: Commit database
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add swarm.db swarm.db-wal swarm.db-shm 2>/dev/null || git add swarm.db
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "data: update execution ${{ inputs.execution_id }}

          status=${{ inputs.status }}
          completed=${{ inputs.mark_completed }}
          cost_added=${{ inputs.add_cost_cents }}
          api_run=${{ github.run_id }}"
            git push
          fi

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-update-execution-${{ github.run_id }}
          path: api-output/result.json
          retention-days: 1

      - name: Job summary
        run: |
          {
            echo "## API: Update Execution"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| execution_id | \`${{ inputs.execution_id }}\` |"
            echo "| status | \`${{ inputs.status }}\` |"
            echo "| mark_completed | ${{ inputs.mark_completed }} |"
            echo "| add_cost_cents | ${{ inputs.add_cost_cents }} |"
            echo ""
            echo "Database updated and committed."
          } >> "$GITHUB_STEP_SUMMARY"
