name: Auto Assign Issues to Project

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, labeled]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      actions: write
      security-events: write
      repository-projects: write
      id-token: write
      statuses: write
      checks: write
      contents: write
    steps:
      - name: Add to project
        if: vars.PROJECT_BOARD_URL != null && vars.PROJECT_BOARD_URL != ''
        uses: actions/add-to-project@v1.0.2
        continue-on-error: true
        with:
          # Update this URL with your actual project URL after creating the project board
          # Example: https://github.com/orgs/Universal-Standard/projects/YOUR_PROJECT_NUMBER
          project-url: ${{ vars.PROJECT_BOARD_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log project assignment status
        if: vars.PROJECT_BOARD_URL == null || vars.PROJECT_BOARD_URL == ''
        run: echo "PROJECT_BOARD_URL is not configured; skipping add-to-project step."
